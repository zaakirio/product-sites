<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="assay - document extraction you can sign off on">
  <rect width="1280" height="320" fill="#17150f"/>

  <!-- DOCUMENT-AS-FIELD-GRID: a document on the left whose fields are being assayed;
       each field cell carries a per-field verdict. Analytical grid, not a mark. -->
  <g transform="translate(88,52)" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">
    <rect x="0" y="0" width="300" height="216" rx="10" fill="#201d14" stroke="#3d3524" stroke-width="2"/>
    <!-- extracted field rows, each with a confidence bar + tick -->
    <g transform="translate(22,30)">
      <text x="0" y="0" font-size="13" fill="#8a7f63">vendor</text>
      <rect x="120" y="-11" width="120" height="7" rx="3.5" fill="#2c2718"/><rect x="120" y="-11" width="116" height="7" rx="3.5" fill="#dbb43a"/>
      <path d="M250 -11 l4 5 8 -10" fill="none" stroke="#57c98a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(22,66)">
      <text x="0" y="0" font-size="13" fill="#8a7f63">invoice_no</text>
      <rect x="120" y="-11" width="120" height="7" rx="3.5" fill="#2c2718"/><rect x="120" y="-11" width="116" height="7" rx="3.5" fill="#dbb43a"/>
      <path d="M250 -11 l4 5 8 -10" fill="none" stroke="#57c98a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(22,102)">
      <text x="0" y="0" font-size="13" fill="#8a7f63">total</text>
      <rect x="120" y="-11" width="120" height="7" rx="3.5" fill="#2c2718"/><rect x="120" y="-11" width="104" height="7" rx="3.5" fill="#dbb43a"/>
      <path d="M250 -11 l4 5 8 -10" fill="none" stroke="#57c98a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(22,138)">
      <text x="0" y="0" font-size="13" fill="#8a7f63">tax</text>
      <rect x="120" y="-11" width="120" height="7" rx="3.5" fill="#2c2718"/><rect x="120" y="-11" width="70" height="7" rx="3.5" fill="#c98f2a"/>
      <!-- low confidence: routed to review, not a tick -->
      <text x="250" y="-4" font-size="15" fill="#d98a2b">?</text>
    </g>
    <g transform="translate(22,174)">
      <text x="0" y="0" font-size="13" fill="#8a7f63">line_items</text>
      <rect x="120" y="-11" width="120" height="7" rx="3.5" fill="#2c2718"/><rect x="120" y="-11" width="108" height="7" rx="3.5" fill="#dbb43a"/>
      <path d="M250 -11 l4 5 8 -10" fill="none" stroke="#57c98a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- RIGHT: wordmark, tagline, the headline the grid implies -->
  <g transform="translate(452,0)">
    <text x="0" y="132" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="80" font-weight="800" letter-spacing="-2" fill="#f3efe4">assay</text>
    <text x="4" y="174" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#b8ac93">Document extraction you can sign off on.</text>
    <text x="4" y="212" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#807458" letter-spacing="0.5">per-field precision/recall · confidence routing · human review queue</text>
  </g>
</svg>
