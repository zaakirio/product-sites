<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="bellows - MCP hands for a local model fleet">
  <rect width="1280" height="320" fill="#1a1311"/>

  <!-- SOURCE-TO-FLEET: a bellows (left) pumps commands through MCP into a grid of
       model-server nodes (right). Mechanical feed into many, not a clean split. -->
  <!-- bellows pump -->
  <g transform="translate(96,96)">
    <path d="M8 64 L70 40 L70 88 Z" fill="#d43d2c"/>
    <path d="M8 64 L70 40 L70 64 Z" fill="#e35a49"/>
    <rect x="70" y="52" width="20" height="24" rx="3" fill="#8f2a1e"/>
    <circle cx="18" cy="64" r="6" fill="#2a1512"/>
    <!-- nozzle -->
    <rect x="90" y="58" width="26" height="12" rx="3" fill="#d43d2c"/>
  </g>

  <!-- airflow: three pulse lines crossing to the fleet -->
  <g stroke="#d43d2c" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M218 150 H300 l-10 -6 M300 150 l-10 6"/>
    <path d="M218 176 H300" opacity="0.5"/>
    <path d="M218 202 H300" opacity="0.35"/>
  </g>

  <!-- the fleet: 2x3 grid of model-server node chips -->
  <g transform="translate(320,96)" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">
    <g>
      <rect x="0" y="0" width="118" height="52" rx="7" fill="#241715" stroke="#40241f" stroke-width="2"/>
      <circle cx="18" cy="26" r="5" fill="#57c98a"/><text x="34" y="31" font-size="13" fill="#c9b3ad">gemma-4</text>
    </g>
    <g transform="translate(134,0)">
      <rect x="0" y="0" width="118" height="52" rx="7" fill="#241715" stroke="#40241f" stroke-width="2"/>
      <circle cx="18" cy="26" r="5" fill="#57c98a"/><text x="34" y="31" font-size="13" fill="#c9b3ad">lfm2.5</text>
    </g>
    <g transform="translate(0,66)">
      <rect x="0" y="0" width="118" height="52" rx="7" fill="#241715" stroke="#40241f" stroke-width="2"/>
      <circle cx="18" cy="26" r="5" fill="#d98a2b"/><text x="34" y="31" font-size="13" fill="#c9b3ad">ornith-9b</text>
    </g>
    <g transform="translate(134,66)">
      <rect x="0" y="0" width="118" height="52" rx="7" fill="#241715" stroke="#40241f" stroke-width="2"/>
      <circle cx="18" cy="26" r="5" fill="#4a4038"/><text x="34" y="31" font-size="13" fill="#7c7069">idle</text>
    </g>
  </g>

  <!-- wordmark, lower-right of the mechanism -->
  <g transform="translate(600,0)">
    <text x="0" y="150" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#f2ebe7">bellows</text>
    <text x="4" y="190" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" fill="#bd9f98">MCP hands for a local model fleet.</text>
    <text x="4" y="226" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#87665f" letter-spacing="0.4">Model Context Protocol · llama-server supervision · smoke tests</text>
  </g>
</svg>
