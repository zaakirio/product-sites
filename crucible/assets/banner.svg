<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="crucible - what survives quantization, abliteration, and serving">
  <defs>
    <linearGradient id="cr-melt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd9a0"/>
      <stop offset="0.5" stop-color="#e8590c"/>
      <stop offset="1" stop-color="#7a2c06"/>
    </linearGradient>
    <radialGradient id="cr-heat" cx="0.5" cy="1" r="0.9">
      <stop offset="0" stop-color="#e8590c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e8590c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="320" fill="#191512"/>

  <!-- LEFT: the vessel is the hero, heat rising, measurement gauge beside it -->
  <g transform="translate(150,60)">
    <ellipse cx="70" cy="250" rx="150" ry="34" fill="url(#cr-heat)"/>
    <!-- gauge ticks: this is a measurement tool -->
    <g stroke="#8a7f70" stroke-width="2" font-family="ui-monospace,Menlo,monospace">
      <line x1="-26" y1="60" x2="-14" y2="60"/><line x1="-26" y1="110" x2="-14" y2="110"/>
      <line x1="-26" y1="160" x2="-14" y2="160"/><line x1="-26" y1="210" x2="-14" y2="210"/>
      <line x1="-20" y1="85" x2="-14" y2="85"/><line x1="-20" y1="135" x2="-14" y2="135"/><line x1="-20" y1="185" x2="-14" y2="185"/>
    </g>
    <!-- crucible pot -->
    <path d="M6 70 L134 70 L118 232 Q116 250 96 250 L44 250 Q24 250 22 232 Z" fill="#241c16" stroke="#4a3d31" stroke-width="3"/>
    <!-- molten surface -->
    <ellipse cx="70" cy="72" rx="64" ry="15" fill="url(#cr-melt)"/>
    <ellipse cx="70" cy="70" rx="64" ry="14" fill="#241c16" opacity="0.0"/>
    <path d="M8 72 L132 72 L120 150 L20 150 Z" fill="url(#cr-melt)" opacity="0.55"/>
    <!-- rising heat wisps -->
    <path d="M46 66 q-8 -26 6 -46 q8 -14 -2 -30" fill="none" stroke="#e8590c" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M92 62 q10 -30 -4 -52 q-8 -12 4 -28" fill="none" stroke="#ffb066" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M70 60 q-4 -34 2 -58" fill="none" stroke="#e8590c" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- RIGHT: wordmark + tagline + capability line -->
  <g transform="translate(400,0)">
    <text x="0" y="150" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="82" font-weight="800" letter-spacing="-2" fill="#f3ece4">crucible</text>
    <text x="4" y="192" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#b7a998">What survives quantization, abliteration, and serving.</text>
    <text x="4" y="230" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#7c7060" letter-spacing="0.5">capability · refusal profiles · tool calls · base-vs-modified deltas · web lab</text>
  </g>
</svg>
