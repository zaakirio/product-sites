<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="Foundry product map showing Flux connecting Quench, Anvil, Ingot, Sluice, Assay, Bellows, and Crucible">
  <defs>
