      <stop offset="0" stop-color="#eeb36b"/>
      <stop offset="1" stop-color="#b66a35"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1280" height="520" rx="24" fill="#15120f"/>
  <rect x="28" y="28" width="1224" height="464" rx="18" fill="#201b16" stroke="#5f4b38" stroke-width="2"/>
  <g opacity="0.5">
