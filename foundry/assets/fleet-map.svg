    <text x="80" y="116" fill="#eae0d5" font-size="34" font-weight="800" letter-spacing="-0.8">one measured AI-engineering portfolio</text>
    <text x="80" y="152" fill="#b7a895" font-size="18">registry + trace + eval + cost + RAG + routing + extraction + local model proof</text>
