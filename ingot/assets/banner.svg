<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="ingot - what did the tokens buy?">
  <defs>
    <linearGradient id="in-pour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9c778"/>
      <stop offset="1" stop-color="#c98f2a"/>
    </linearGradient>
    <linearGradient id="in-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0b45f"/>
      <stop offset="1" stop-color="#a9741d"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="#17140d"/>

  <!-- VERTICAL POUR: a token stream falls from a spout (top) through a mold and
       casts into a solid ingot (bottom) stamped with the cost-per-commit. -->
  <g transform="translate(150,0)">
    <!-- spout -->
    <path d="M20 40 L92 40 L74 66 L38 66 Z" fill="#3a2f18"/>
    <path d="M48 66 L64 66 L61 168 L51 168 Z" fill="url(#in-pour)" opacity="0.9"/>
    <!-- falling token glyphs turning molten -->
    <g font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#c7a85c" text-anchor="middle" opacity="0.9">
      <text x="56" y="94">tok</text><text x="56" y="120">tok</text><text x="56" y="146">tok</text>
    </g>
    <!-- cast ingot -->
    <g transform="translate(0,176)">
      <path d="M0 40 L112 40 L96 4 L16 4 Z" fill="url(#in-bar)"/>
      <path d="M0 40 L112 40 L108 56 L4 56 Z" fill="#8a6017"/>
      <text x="56" y="30" font-family="ui-monospace,Menlo,monospace" font-size="15" font-weight="700" fill="#3a2a0c" text-anchor="middle">$11.01</text>
    </g>
    <text x="56" y="252" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#7a6c4a" text-anchor="middle">per commit</text>
  </g>

  <!-- wordmark right -->
  <g transform="translate(360,0)">
    <text x="0" y="140" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="80" font-weight="800" letter-spacing="-2" fill="#f3efe4">ingot</text>
    <text x="4" y="182" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="22" fill="#bcac86">What did the tokens buy?</text>
    <text x="4" y="220" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#847555" letter-spacing="0.5">agent usage telemetry × git history · cost per shipped commit · cache economics</text>
  </g>
</svg>
