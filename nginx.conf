server_tokens off;
gzip on;
gzip_types text/css image/svg+xml application/javascript text/plain;

map $host $site_root {
    hostnames;
    foundry.zaakir.io  /srv/sites/foundry;
    anvil.zaakir.io    /srv/sites/anvil;
    quench.zaakir.io   /srv/sites/quench;
    assay.zaakir.io    /srv/sites/assay;
    bellows.zaakir.io  /srv/sites/bellows;
    ingot.zaakir.io    /srv/sites/ingot;
    crucible.zaakir.io /srv/sites/crucible;
    flux.zaakir.io     /srv/sites/flux;
    default            "";
}

server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        if ($site_root = "") {
            return 404;
        }
        root $site_root;
        index index.html;
        try_files $uri $uri/ =404;
    }

    location ~* \.(svg|png|jpg|webp|css|js|woff2?)$ {
        if ($site_root = "") {
            return 404;
        }
        root $site_root;
        expires 7d;
        add_header Cache-Control "public";
    }
}
